name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: windows-x86_64
            expected_arch: X64
          - os: ubuntu-latest
            platform: linux
            target: linux-x86_64
            expected_arch: X64
          - os: macos-14
            platform: macos
            target: macos-arm64
            expected_arch: ARM64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Verify requested release tag checkout
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if ! git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Release tag does not exist: ${RELEASE_TAG}" >&2
            exit 1
          fi
          TAG_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "${HEAD_COMMIT}" != "${TAG_COMMIT}" ]; then
            echo "HEAD ${HEAD_COMMIT} does not match ${RELEASE_TAG} commit ${TAG_COMMIT}" >&2
            exit 1
          fi
      - name: Verify runner architecture
        if: matrix.expected_arch != ''
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.expected_arch }}
          ACTUAL_ARCH: ${{ runner.arch }}
        run: test "${ACTUAL_ARCH}" = "${EXPECTED_ARCH}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"
      - name: Validate release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if tag != version:
              raise SystemExit(f"release tag {tag!r} does not match project version {version!r}")
          PY
      - name: Build platform executables
        env:
          RUNNER_ARCH: ${{ runner.arch }}
        run: python scripts/build_release.py --platform ${{ matrix.platform }}
      - name: QA packaged CLI
        shell: bash
        run: |
          CLI="$(find release-artifacts/${{ matrix.platform }}-* -maxdepth 1 -type f -name 'net-stability-${{ matrix.platform }}-*' ! -name '*.tar.gz' | head -n 1)"
          test -n "$CLI"
          chmod +x "$CLI"
          "$CLI" --version
      - name: Package and validate macOS disk image
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          for dir in macos-*; do
            ARCH="${dir#macos-}"
            APP="$(find "$dir" -maxdepth 1 -type d -name 'net-stability-gui-macos-*.app' -print -quit)"
            CLI="$(find "$dir" -maxdepth 1 -type f -name 'net-stability-macos-*' ! -name '*.tar.gz' -print -quit)"
            test -n "$APP"
            test -f "$APP/Contents/Info.plist"
            test -d "$APP/Contents/MacOS"
            test -n "$CLI"
            rm -rf dmg-stage dmg-mount
            mkdir -p "dmg-stage/Net Stability" dmg-mount
            cp -R "$APP" "dmg-stage/Net Stability/"
            cp "$CLI" "dmg-stage/Net Stability/"
            ln -s /Applications "dmg-stage/Net Stability/Applications"
            DMG="$dir/net-stability-${{ github.event.inputs.tag || github.ref_name }}-macos-${ARCH}.dmg"
            hdiutil create \
              -volname "Net Stability ${ARCH}" \
              -srcfolder "dmg-stage/Net Stability" \
              -ov \
              -format UDZO \
              -o "$DMG"
            hdiutil attach "$DMG" -nobrowse -readonly -mountpoint dmg-mount
            test -d "dmg-mount/$(basename "$APP")"
            test -f "dmg-mount/$(basename "$CLI")"
            hdiutil detach dmg-mount
            rm -rf dmg-stage dmg-mount
          done
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-stability-${{ matrix.target }}
          path: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/net-stability-*
            release-artifacts/**/checksums.txt
            !release-artifacts/**/build/**
            !release-artifacts/**/specs/**

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Prepare release upload set
        run: |
          mkdir -p release-upload
          find release-artifacts -type f \
            ! -name checksums.txt \
            ! -path '*/build/*' \
            ! -path '*/specs/*' \
            ! -path '*.app/*' \
            -print0 |
          while IFS= read -r -d '' file; do
            cp "$file" "release-upload/$(basename "$file")"
          done
          cd release-upload
          sha256sum $(find . -maxdepth 1 -type f ! -name checksums.txt -printf '%P\n' | sort) > checksums.txt
      - name: Stage draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "Net Stability ${{ github.event.inputs.tag || github.ref_name }}"
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-upload/*
