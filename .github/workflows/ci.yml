name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.11"
          - os: macos-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Build and smoke-test isolated wheel install
        shell: bash
        run: |
          python -m build --wheel
          python - <<'PY'
          import os
          import subprocess
          import sys
          import tempfile
          import venv
          from pathlib import Path

          root = Path.cwd()
          wheel = next((root / "dist").glob("*.whl"))
          with tempfile.TemporaryDirectory() as temporary:
              target = Path(temporary)
              environment = target / "venv"
              venv.EnvBuilder(with_pip=True).create(environment)
              scripts = environment / ("Scripts" if os.name == "nt" else "bin")
              python = scripts / ("python.exe" if os.name == "nt" else "python")
              env = os.environ.copy()
              env.pop("PYTHONPATH", None)
              subprocess.run([str(python), "-m", "pip", "install", str(wheel)], check=True, cwd=target, env=env)
              subprocess.run(
                  [str(python), "-c", "import net_stability, net_stability_gui; import modules.net_stability_action_policy, modules.windows_dns_policy"],
                  check=True,
                  cwd=target,
                  env=env,
              )
              subprocess.run([str(scripts / ("net-stability.exe" if os.name == "nt" else "net-stability")), "--version"], check=True, cwd=target, env=env)
              subprocess.run([str(scripts / ("net-stability-gui.exe" if os.name == "nt" else "net-stability-gui")), "--smoke"], check=True, cwd=target, env=env)
          PY
      - name: Compile Python modules
        run: python -m compileall -q .
      - name: Run CLI and GUI smoke checks
        shell: bash
        run: |
          python net_stability.py --version
          python net_stability_gui.py --smoke
      - name: Verify version consistency
        shell: bash
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          expected = project["project"]["version"]
          source = Path("modules/net_stability.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION = "([^"]+)"$', source, re.MULTILINE)
          assert match and match.group(1) == expected, (match and match.group(1), expected)
          print(f"version: {expected}")
          PY
